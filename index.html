<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Previsão de Preço por Quantidade</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body>

<div class="card">
    <div class="tag">IA · TensorFlow.js</div>
    <h1>Previsão de <span>Preço</span> por Quantidade</h1>
    <p class="descricao">
        Um modelo de regressão linear aprende a relação entre<br>
        quantidade de itens comprados e o preço total estimado.<br>
        Digite uma quantidade e veja a IA fazer sua previsão.
    </p>

    <label for="quantidade">Quantidade de itens</label>
    <input type="number" id="quantidade" placeholder="Ex: 7" min="1">

    <button onclick="treinarEPrever()">▶ Treinar e Prever</button>

    <div class="status-box">
        <div class="dot" id="dot"></div>
        <span id="status">Aguardando entrada...</span>
    </div>

    <div class="resultado-box" id="resultadoBox">
        <div class="resultado-label">Preço total estimado</div>
        <div class="resultado-valor" id="resultado">—</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
